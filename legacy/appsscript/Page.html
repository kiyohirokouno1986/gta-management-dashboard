function mqWaterfallHTML(d){
 const a=d.saas.a,b=d.saas.b,c=d.saas.c,f=d.saas.f,g=d.saas.g;
 const lv=[0,a,a+b,a+b+c,a+b+c-f];const tot=g;
 const maxL=Math.max(...lv,tot,0),minL=Math.min(...lv,tot,0);
 const top=20,bot=200,H=bot-top,range=(maxL-minL)||1,sc=H/range;const y=v=>bot-(v-minL)*sc;
 const xs=[50,145,240,335,430],cw=60;
 const segs=[['注文',0,a,a>=0?'#1D9E75':'#D85A30'],['仲介',1,b,b>=0?'#5DCAA5':'#D85A30'],['CX',2,c,c>=0?'#5DCAA5':'#D85A30'],['固定費F',3,-f,'#F0997B']];
 let bars='',conn='',labs='',names='';
 segs.forEach(([nm,k,delta,col])=>{const a0=lv[k],a1=lv[k+1];const t=Math.max(a0,a1),bm=Math.min(a0,a1);const x=xs[k];
  bars+=`<rect x="${x}" y="${y(t).toFixed(1)}" width="${cw}" height="${Math.max(1,(t-bm)*sc).toFixed(1)}" fill="${col}"/>`;
  const lc=delta<0?'#993C1D':'#2C2C2A';const ly=delta<0&&nm=='固定費F'?(y(t)+ (t-bm)*sc/2):y(t)-5;
  labs+=`<text x="${x+cw/2}" y="${(nm=='固定費F'?ly+4:y(t)-5).toFixed(1)}" font-size="10.5" font-weight="600" fill="${nm=='固定費F'?'#fff':lc}" text-anchor="middle">${(delta>=0?'+':'')+yen(delta)}</text>`;
  names+=`<text x="${x+cw/2}" y="216" font-size="10" fill="#5F5E5A" text-anchor="middle">${nm}</text>`;
  if(k<3){const xr=x+cw,xn=xs[k+1];conn+=`<line x1="${xr}" y1="${y(a1).toFixed(1)}" x2="${xn}" y2="${y(a1).toFixed(1)}" stroke="#C9C7BE" stroke-dasharray="3 3"/>`;}
 });
 // connector cx->固定費 already covered (k=2 ->3). 固定費->利益:
 conn+=`<line x1="${xs[3]+cw}" y1="${y(lv[4]).toFixed(1)}" x2="${xs[4]}" y2="${y(lv[4]).toFixed(1)}" stroke="#C9C7BE" stroke-dasharray="3 3"/>`;
 const tx=xs[4];bars+=`<rect x="${tx}" y="${y(tot).toFixed(1)}" width="${cw}" height="${Math.max(1,(tot-Math.max(0,minL))*sc).toFixed(1)}" fill="#534AB7"/>`;
 labs+=`<text x="${tx+cw/2}" y="${(y(tot)-5).toFixed(1)}" font-size="10.5" font-weight="600" fill="#3C3489" text-anchor="middle">${yen(tot)}</text>`;
 names+=`<text x="${tx+cw/2}" y="216" font-size="10" font-weight="600" fill="#3C3489" text-anchor="middle">SaaS利益</text>`;
 return `<div class="card"><div style="font-size:13px;font-weight:600">詳細版：SaaS限界利益を 注文・仲介・CX に分解（${MONTHS[d.i]}）</div>
 <div style="font-size:11px;color:#888780;margin-bottom:6px">各事業の限界利益を積み上げ → 固定費F（SaaS配賦分）を引いてSaaS利益に着地。単位：円</div>
 <svg viewBox="0 0 560 240" width="100%"><line x1="30" y1="200" x2="545" y2="200" stroke="#E5E3DB"/>
 ${conn}${bars}${labs}${names}</svg>

}

function render(){
  const tabs=document.getElementById('tabs');
 tabs.innerHTML=UNITS.map((u,k)=>`<button class="tab${cur===k?' active':''}" data-k="${k}">${u.name}</button>`).join('')+`<button class="tab${cur==='progress'?' active':''}" data-k="progress" style="${cur==='progress'?'background:#534AB7;color:#fff;border-color:#534AB7':''}">進捗</button>`+`<button class="tab${cur==='vision'?' active':''}" data-k="vision" style="${cur==='vision'?'background:#534AB7;color:#fff;border-color:#534AB7':''}">目指す姿</button>`+`<button class="tab${cur==='rules'?' active':''}" data-k="rules" style="${cur==='rules'?'background:#9C7B2E;color:#fff;border-color:#9C7B2E':''}">ルール・方針</button>`;
 tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{const k=b.dataset.k;cur=(k==='rules'||k==='vision'||k==='progress')?k:+k;render();});
 if(cur==='rules'){document.getElementById('unitPanel').innerHTML=rulesPanel();}
 else if(cur==='vision'){document.getElementById('unitPanel').innerHTML=visionPanel();}
 else if(cur==='progress'){document.getElementById('unitPanel').innerHTML=progressPanel();}
 else{document.getElementById('unitPanel').innerHTML=unitPanel(cur);bindM();}
 document.getElementById('note').innerHTML='売上＝10期計画＆実績シート（クラウド・自動更新）。利益段（売上総利益・直接コスト①②・直接コスト計・貢献利益・間接コスト・部門利益）と配賦人月＝部門別PL（管理会計）2〜5月スナップショット。新しい部門別PLを入れた時点で更新。計画列は売上高のみ。間接費プールは各部門へ配賦している間接費の総額（固定費モニタ）。';
}
function load(){
  document.getElementById('status').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}
load();
</script></body></html>
